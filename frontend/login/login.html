<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CineMagic</title>
    <link rel="stylesheet" href="../globals.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="split-layout">
      <aside class="auth-side">
        <nav class="brand">ABSOLUTE<span class="text-yellow">CINEMA</span></nav>

        <section class="auth-container">
          <header class="auth-header">
            <h1 id="authTitle">Welcome Back</h1>
            <p id="authSubtitle">Enter your username below to login to your account</p>
          </header>

          <form id="authForm" class="modern-form">
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="username" placeholder="username" required />
            </div>

            <div class="form-group">
              <div class="label-row">
                <label>Password</label>
                <a href="#" class="forgot-link">Forgot your password?</a>
              </div>
              <input type="password" id="password" placeholder="• • • • • • • •" required />
            </div>

            <div id="registerFields" class="hidden">
              <div class="form-group">
                <label>Initial Balance (Rp)</label>
                <input type="number" id="saldo" value="100000" />
              </div>

              <div class="form-group">
                <label>Account Role</label>
                <select id="role">
                  <option value="customer">Customer</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary">Login</button>
          </form>

          <div id="errorMsg" class="error-container"></div>

          <div class="auth-footer">
            <p>
              <span id="toggleText">Don't have an account?</span>
              <a href="#" id="toggleAuth">Sign up</a>
            </p>
          </div>
        </section>
      </aside>

      <aside class="banner-side">
        <div class="banner-overlay">
          <h2>Experience Cinematic Excellence</h2>
        </div>
      </aside>
    </div>
    <script src="script.js"></script>
  </body>
</html>
